  <ellipse cx="16" cy="16" rx="2" ry="9" fill="#c9a84c"/>
  <!-- Wings -->
  <ellipse cx="16" cy="16" rx="11" ry="2.2" fill="#c9a84c"/>
  <!-- Tail fins -->
